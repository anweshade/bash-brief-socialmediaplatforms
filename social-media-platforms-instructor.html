<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bash Brief — Instructor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#CC0000; --red-dk:#990000;
  --gold:#C87D00; --gold-bd:#F0B429; --gold-bg:#FEF8EC;
  --dark:#1A1A2E; --green:#166534; --teal:#0F5264;
  --bg:#F5F4F1; --surface:#FFFFFF;
  --border:#E2E0DA; --border2:#CCC9C0;
  --text:#1A1A2E; --muted:#6B6B80; --light:#F0EEE9;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);font-size:16px;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--dark);display:flex;align-items:center;gap:.75rem;padding:0 1.25rem;height:52px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:700;color:#fff;letter-spacing:.04em;}
.topbar-logo em{color:var(--red);font-style:normal;}
.topbar-badge{background:var(--red);color:#fff;font-size:.7rem;font-weight:700;padding:.2rem .55rem;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;}
.topbar-phase{margin-left:auto;font-size:.85rem;color:#8888AA;letter-spacing:.04em;}
.pdots{display:flex;gap:.35rem;margin-left:.75rem;}
.pdot{width:9px;height:9px;border-radius:50%;background:#333355;transition:background .3s;}
.pdot.active{background:var(--gold-bd);}
.pdot.done{background:var(--green);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 52px);}
.left{padding:1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
.right{background:var(--surface);border-left:1px solid var(--border);padding:1rem;overflow-y:auto;}

/* CONTROL CARD */
.ctrl-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ctrl-head{background:var(--dark);display:flex;align-items:center;gap:.75rem;padding:.85rem 1.1rem;}
.ctrl-badge{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.22rem .55rem;border-radius:3px;color:#fff;}
.bg-green{background:var(--green);}.bg-teal{background:var(--teal);}.bg-gold{background:var(--gold);}.bg-red{background:var(--red);}
.ctrl-title{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;color:#fff;flex:1;}
.ctrl-timer{font-family:'Barlow Condensed',sans-serif;font-size:2.5rem;font-weight:700;color:var(--gold-bd);font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.ctrl-timer.urgent{color:#F87171;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.prog-track{height:4px;background:var(--border);}
.prog-fill{height:100%;background:var(--red);transition:width 1s linear;}
.ctrl-body{padding:1rem 1.1rem;}
.ctrl-desc{font-size:.9rem;color:var(--muted);margin-bottom:.85rem;line-height:1.6;}
.phase-btn-row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;}
.phase-btn{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.04em;padding:.55rem 1.1rem;border-radius:5px;cursor:pointer;border:2px solid var(--border2);background:var(--surface);color:var(--text);transition:all .15s;display:flex;align-items:center;gap:.4rem;}
.phase-btn:hover{border-color:var(--gold-bd);background:var(--gold-bg);}
.phase-btn.primary{background:var(--red);color:#fff;border-color:var(--red);}
.phase-btn.primary:hover{background:var(--red-dk);}
.phase-btn.gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.phase-btn.gold:hover{background:var(--gold-bd);}
#student-url{color:var(--red);font-size:.88rem;font-weight:600;word-break:break-all;}

/* SUBMISSIONS */
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.sec-head{display:flex;align-items:center;padding:.75rem 1.1rem;border-bottom:1px solid var(--border);background:var(--light);}
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.sub-card{border-bottom:1px solid var(--border);padding:.85rem 1.1rem;}
.sub-card:last-child{border-bottom:none;}
.sub-card-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem;}
.sub-team-tag{font-size:.75rem;font-weight:700;padding:.2rem .5rem;border-radius:3px;color:#fff;flex-shrink:0;}
.sub-task-lbl{font-size:.88rem;font-weight:600;color:var(--text);flex:1;}
.sub-answers{font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:.5rem;max-height:72px;overflow:hidden;}
.sub-answers.exp{max-height:none;}
.sub-answers.hidden{display:none;}
.expand-lnk{background:none;border:none;color:var(--gold);font-size:.78rem;cursor:pointer;padding:0;margin-bottom:.5rem;}
.expand-lnk.hidden{display:none;}
.approve-row{display:flex;align-items:flex-end;gap:.6rem;margin-top:.5rem;}
.asel{background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.9rem;padding:.38rem .5rem;outline:none;cursor:pointer;}
.asel:focus{border-color:var(--gold-bd);}
.ok-btn{background:var(--green);color:#fff;border:none;border-radius:4px;padding:.42rem .8rem;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.03em;}
.ok-btn:hover{opacity:.9;}
.no-btn{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:4px;padding:.42rem .65rem;font-size:.88rem;cursor:pointer;}
.no-btn:hover{border-color:var(--red);color:var(--red);}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-wrap{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--muted);padding:.4rem 0;}
.empty-note{padding:.85rem 1.1rem;font-size:.9rem;color:var(--muted);}

/* TEAMS PANEL */
.right .sec-label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.65rem .85rem;border-bottom:1px solid var(--border);}
.team-row{display:flex;align-items:center;gap:.5rem;padding:.65rem .85rem;border-bottom:1px solid var(--border);font-size:.9rem;}
.team-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.team-name{flex:1;font-weight:600;}
.score-cols{display:flex;gap:.35rem;align-items:center;}
.score-box{background:var(--light);border:1px solid var(--border);border-radius:3px;font-size:.75rem;text-align:center;min-width:38px;padding:.18rem .3rem;font-weight:600;color:var(--muted);}
.score-box.has{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold);}
.total-score{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;color:var(--gold);min-width:28px;text-align:right;}
.pitch-inp{width:44px;background:var(--bg);border:1px solid var(--border2);border-radius:3px;color:var(--text);font-size:.82rem;padding:.2rem .35rem;text-align:center;outline:none;}
.pitch-inp:focus{border-color:var(--gold-bd);}

/* VOTE PANEL */
.vote-row-item{padding:.65rem .85rem;border-bottom:1px solid var(--border);}
.vote-row-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;}
.vbar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.vbar{height:100%;background:var(--gold-bd);border-radius:3px;transition:width .4s;}
.vote-pts{font-size:.78rem;font-weight:700;color:var(--gold);min-width:40px;text-align:right;}
.vote-count{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);min-width:28px;text-align:center;}

/* FINAL */
.final-table{width:100%;border-collapse:collapse;font-size:.9rem;}
.final-table th{background:var(--dark);color:#fff;padding:.5rem .75rem;text-align:left;font-size:.8rem;}
.final-table th:not(:first-child){text-align:center;}
.final-table td{padding:.5rem .75rem;border-bottom:1px solid var(--border);}
.final-table td:not(:first-child){text-align:center;}
.final-table .winner td{background:var(--gold-bg);}
.rank-star{color:var(--gold);}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--dark);color:#fff;border-radius:6px;padding:.65rem 1.1rem;font-size:.88rem;z-index:1000;transform:translateY(60px);transition:transform .25s;white-space:nowrap;}
.toast.show{transform:translateY(0);}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">THE <em>BASH</em> BRIEF</div>
  <div class="topbar-badge">INSTRUCTOR</div>
  <div class="topbar-phase" id="phase-status">Setup</div>
  <div class="pdots">
    <div class="pdot" id="dot-0"></div>
    <div class="pdot" id="dot-1"></div>
    <div class="pdot" id="dot-2"></div>
  </div>
</div>

<div class="layout">
  <!-- LEFT -->
  <div class="left">
    <!-- Control Card -->
    <div class="ctrl-card">
      <div class="ctrl-head">
        <div class="ctrl-badge bg-red" id="ctrl-badge">SETUP</div>
        <div class="ctrl-title" id="ctrl-title">The Bash Brief</div>
        <div class="ctrl-timer" id="ctrl-timer">—</div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="ctrl-prog" style="width:0%"></div></div>
      <div class="ctrl-body">
        <div class="ctrl-desc" id="ctrl-desc">
          Students join at: <span id="student-url">—</span><br>
          Teams joined: <span id="teams-joined">0</span>/6
        </div>
        <div class="phase-btn-row" id="phase-btns">
          <button class="phase-btn primary" onclick="startRound(0)">▶ Start Round 1 (8 min)</button>
          <button class="phase-btn" style="margin-left:auto;border-color:#AA3333;color:var(--red);" onclick="resetGame()">↺ Reset for new class</button>
        </div>
      </div>
    </div>

    <!-- Submissions -->
    <div class="sec-card">
      <div class="sec-head">
        <span class="sec-label">Submissions</span>
        <div style="display:flex;gap:.5rem;align-items:center;margin-left:auto;">
          <button onclick="toggleAnswerVisibility()" id="ans-vis-btn" style="background:var(--light);border:1px solid var(--border2);color:var(--muted);border-radius:3px;padding:.22rem .6rem;font-size:.8rem;cursor:pointer;">👁 Show answers</button>
          <span style="font-size:.88rem;color:var(--muted);" id="sub-count">0 pending</span>
        </div>
      </div>
      <div id="submissions-list">
        <div class="empty-note">No submissions yet.</div>
      </div>
    </div>

    <!-- Final Results -->
    <div class="sec-card" id="final-card" style="display:none;">
      <div class="sec-head"><span class="sec-label">Final Results</span></div>
      <div style="padding:.85rem 1.1rem;">
        <table class="final-table" id="final-tbl">
          <thead><tr><th>Rank</th><th>Team</th><th>R1</th><th>R2</th><th>Pitch</th><th>Vote</th><th>Total</th></tr></thead>
          <tbody id="final-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <span class="sec-label">Teams &amp; Scores</span>
    <div id="teams-panel"></div>

    <div id="vote-panel" style="display:none;margin-top:1rem;">
      <span class="sec-label" style="display:flex;align-items:center;justify-content:space-between;">
        Live Vote — updates automatically
      </span>
      <div id="vote-rows"></div>
      <div style="padding:.75rem .85rem;border-top:1px solid var(--border);">
        <button class="phase-btn gold" style="width:100%;justify-content:center;" onclick="lockVote()">Lock votes &amp; reveal winner →</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybSi0XHFrS_t2Nc799_A8-8_W4398ooPciUPDWdPhOa3v0zF0olZuN_gPmZCu0kPA2lA/exec';
const TEAM_COLORS = ['#166534','#0F5264','#CC0000','#7A3800','#4A1A6E','#1A3A6E'];
const ROUNDS_CFG = [
  {label:'ROUND 01',title:'Analyst Unlocks', badge:'bg-green',secs:480},
  {label:'ROUND 02',title:'Strategist Builds',badge:'bg-teal', secs:720},
  {label:'ROUND 03',title:'Presenter Preps',  badge:'bg-gold', secs:300},
];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let teams = Array.from({length:6},(_,i)=>({slot:i,name:`Team ${i+1}`,r1:null,r2:null,pitch:null,vote:0,voteCount:0}));
let submissions = [];
let currentPhase = 'setup';
let currentRound = -1;
let timerSec = 0;
let timerInt = null;
let answersVisible = false;

// ══════════════════════════════════════════════════════
// COMMS
// ══════════════════════════════════════════════════════
function get(action, extra='') {
  return new Promise((resolve) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cb] = (data) => { clearTimeout(timeout); delete window[cb]; script.remove(); resolve(data); };
    const timeout = setTimeout(() => { delete window[cb]; script.remove(); resolve(null); }, 8000);
    const script = document.createElement('script');
    script.onerror = () => { clearTimeout(timeout); delete window[cb]; script.remove(); resolve(null); };
    script.src = SCRIPT_URL + '?action=' + action + (extra||'') + '&callback=' + cb;
    document.head.appendChild(script);
  });
}

async function post(payload) {
  if (!SCRIPT_URL || SCRIPT_URL.includes('PASTE')) return {ok:true};
  try {
    await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    return {ok:true};
  } catch(e) { return {ok:false}; }
}

// ══════════════════════════════════════════════════════
// POLL
// ══════════════════════════════════════════════════════
async function poll() {
  const teamData = await get('teams');
  if (teamData?.teams) {
    Object.entries(teamData.teams).forEach(([slot,name]) => {
      const i = parseInt(slot);
      if (teams[i]) teams[i].name = name;
    });
    const tjEl = document.getElementById('teams-joined');
    if (tjEl) tjEl.textContent = Object.keys(teamData.teams).length;
  }

  const subData = await get('submissions');
  if (subData?.submissions) {
    subData.submissions.forEach(raw => {
      const exists = submissions.find(s => s.sheetId === raw.id);
      if (!exists) {
        const sub = {
          sheetId:raw.id, team:raw.team, slot:raw.slot,
          taskId:raw.taskId, maxPts:raw.maxPts, answers:raw.answers,
          roundKey:raw.taskId?.startsWith('r1')?'r1':'r2',
          status:'pending',
        };
        submissions.push(sub);
      }
    });
  }

  const voteData = await get('votes');
  if (voteData?.votes) {
    teams.forEach(t => { t.voteCount = 0; });
    voteData.votes.forEach(v => {
      const t = teams[parseInt(v.slot)];
      if (t) t.voteCount = (t.voteCount||0) + 1;
    });
    if (currentPhase === 'vote') renderVoteRows();
  }

  renderTeamsPanel();
  renderSubmissions();
}

// ══════════════════════════════════════════════════════
// TEAMS PANEL
// ══════════════════════════════════════════════════════
function renderTeamsPanel() {
  const panel = document.getElementById('teams-panel');
  if (!panel) return;
  panel.innerHTML = '';
  teams.forEach(t => {
    const r1 = t.r1 != null ? t.r1 : '—';
    const r2 = t.r2 != null ? t.r2 : '—';
    const pitch = t.pitch != null ? t.pitch : '—';
    const total = (t.r1||0) + (t.r2||0) + (t.pitch||0) + (t.vote||0);
    const row = document.createElement('div');
    row.className = 'team-row';
    row.innerHTML = `
      <div class="team-dot" style="background:${TEAM_COLORS[t.slot]}"></div>
      <div class="team-name">${t.name}</div>
      <div class="score-cols">
        <div class="score-box ${t.r1!=null?'has':''}"><div style="font-size:.6rem;color:inherit;opacity:.7">R1</div>${r1}</div>
        <div class="score-box ${t.r2!=null?'has':''}"><div style="font-size:.6rem;color:inherit;opacity:.7">R2</div>${r2}</div>
        <div style="display:flex;flex-direction:column;gap:.1rem;">
          <div style="font-size:.6rem;color:var(--muted);text-align:center;">Pitch</div>
          <input class="pitch-inp" type="number" min="0" max="5" placeholder="—"
            value="${t.pitch!=null?t.pitch:''}"
            onchange="savePitch(${t.slot},this.value)"
            title="Pitch score 0–5" />
        </div>
      </div>
      <div class="total-score">${total>0?total:''}</div>`;
    panel.appendChild(row);
  });
}

function savePitch(slot, val) {
  const score = Math.min(5, Math.max(0, parseFloat(val)||0));
  teams[slot].pitch = score;
  post({action:'setScore', slot, key:'pitch', value:score});
  renderTeamsPanel();
}

// ══════════════════════════════════════════════════════
// SUBMISSIONS
// ══════════════════════════════════════════════════════
let savedScores = {};

function renderSubmissions() {
  // Save current dropdown values
  submissions.forEach((_,i) => {
    const el = document.getElementById('ssel-'+i);
    if (el && el.value !== '') savedScores[i] = el.value;
  });

  const pending = submissions.filter(s => s.status!=='approved'&&s.status!=='rejected');
  const approved = submissions.filter(s => s.status==='approved');
  const subCount = document.getElementById('sub-count');
  if (subCount) subCount.textContent = `${pending.length} pending`;

  const list = document.getElementById('submissions-list');
  if (!list) return;
  list.innerHTML = '';

  if (submissions.length === 0) {
    list.innerHTML = '<div class="empty-note">No submissions yet.</div>';
    return;
  }

  pending.forEach(sub => {
    const idx = submissions.indexOf(sub);
    const card = document.createElement('div');
    card.className = 'sub-card';
    const maxPts = parseInt(sub.maxPts)||10;
    const taskId = sub.taskId || '';
    const isR1 = taskId.startsWith('r1');
    const isR2 = taskId.startsWith('r2');

    // Quick score buttons based on round
    let quickBtns = '';
    if (isR1) {
      // Auto-graded — show suggested score with approve/adjust
      const ag = sub.autoGrade;
      if (ag) {
        quickBtns = `<div style="background:var(--light);border:1px solid var(--border);border-radius:4px;padding:.4rem .6rem;font-size:.78rem;color:var(--muted);margin-bottom:.4rem;line-height:1.6;">
          <strong style="color:var(--green);">Auto-score: ${ag.score}/${ag.max}</strong> · ${ag.feedback}
        </div>`;
      }
    }

    const savedVal = savedScores[idx] != null ? parseInt(savedScores[idx]) : (sub.autoGrade ? sub.autoGrade.score : null);
    const scoreRange = isR1 ? maxPts+1 : (isR2 ? 11 : 6);
    const quickRange = Array.from({length:scoreRange},(_,v)=>v);

    card.innerHTML = `
      <div class="sub-card-head">
        <span class="sub-team-tag" style="background:${TEAM_COLORS[sub.slot??0]}">${sub.team}</span>
        <span class="sub-task-lbl">Task ${taskId.toUpperCase()} · ${maxPts} pts</span>
      </div>
      <div class="sub-answers${answersVisible?'':' hidden'}" id="sa-${idx}">${sub.answers}</div>
      <button class="expand-lnk${answersVisible?'':' hidden'}" onclick="toggleExp('sa-${idx}')">Show all ▼</button>
      ${quickBtns}
      <div style="display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.4rem;align-items:center;">
        ${quickRange.map(v=>`<button onclick="quickScore(${idx},${v})" id="qb-${idx}-${v}"
          style="min-width:36px;padding:.3rem .4rem;border-radius:4px;font-size:.85rem;font-weight:700;cursor:pointer;border:2px solid ${v===savedVal?'var(--green)':'var(--border2)'};background:${v===savedVal?'var(--green)':'var(--surface)'};color:${v===savedVal?'#fff':'var(--text)'};transition:all .1s;">${v}</button>`).join('')}
        <button class="no-btn" style="margin-left:auto;" onclick="rejectSub(${idx})">✕ Reject</button>
      </div>`;
    list.appendChild(card);

    // Auto-fetch grade for R1 if not done yet
    if (isR1 && !sub.autoGrade && !sub.autoGrading) {
      sub.autoGrading = true;
      get('autograde', '&taskId=' + encodeURIComponent(taskId) + '&answers=' + encodeURIComponent(sub.answers||'')).then(result => {
        if (result && result.score != null) {
          sub.autoGrade = result;
          if (savedScores[idx] == null) savedScores[idx] = result.score;
          renderSubmissions();
        }
      });
    }
  });

  if (approved.length > 0) {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);padding:.6rem 1.1rem .25rem;';
    hdr.textContent = `Approved (${approved.length})`;
    list.appendChild(hdr);
    approved.forEach(sub => {
      const d = document.createElement('div');
      d.style.cssText = 'padding:.4rem 1.1rem;font-size:.85rem;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;';
      d.innerHTML = `<span>${sub.team} · ${(sub.taskId||'').toUpperCase()}</span><span style="color:var(--green);font-weight:600;">+${sub.finalScore} pts</span>`;
      list.appendChild(d);
    });
  }

  // Restore saved scores
  Object.entries(savedScores).forEach(([i,val]) => {
    const el = document.getElementById('ssel-'+i);
    if (el && val) el.value = val;
  });
}

function toggleAnswerVisibility() {
  answersVisible = !answersVisible;
  const btn = document.getElementById('ans-vis-btn');
  if (btn) btn.textContent = answersVisible ? '🙈 Hide answers' : '👁 Show answers';
  document.querySelectorAll('.sub-answers,.expand-lnk').forEach(el => el.classList.toggle('hidden',!answersVisible));
}

function toggleExp(id) {
  const el = document.getElementById(id); if(!el) return;
  el.classList.toggle('exp');
  const btn = el.nextElementSibling;
  if (btn) btn.textContent = el.classList.contains('exp') ? 'Hide ▲' : 'Show all ▼';
}

function quickScore(idx, score) {
  savedScores[idx] = score;
  // Update button styles immediately
  const sub = submissions[idx];
  const maxPts = parseInt(sub?.maxPts)||10;
  const scoreRange = (sub?.taskId||'').startsWith('r1') ? maxPts+1 : ((sub?.taskId||'').startsWith('r2') ? 11 : 6);
  Array.from({length:scoreRange},(_,v)=>v).forEach(v => {
    const btn = document.getElementById(`qb-${idx}-${v}`);
    if (!btn) return;
    const sel = v === score;
    btn.style.borderColor = sel ? 'var(--green)' : 'var(--border2)';
    btn.style.background = sel ? 'var(--green)' : 'var(--surface)';
    btn.style.color = sel ? '#fff' : 'var(--text)';
  });
  // Auto-approve after selecting score
  autoApprove(idx, score);
}

function autoApprove(idx, score) {
  const sub = submissions[idx];
  if (!sub) return;
  // Find team by slot
  const teamIdx = sub.slot != null ? parseInt(sub.slot) : teams.findIndex(t => t.name === sub.team);
  const ti = teamIdx >= 0 ? teamIdx : 0;
  sub.finalScore = score; sub.approvedTeam = ti; sub.status = 'approved';
  const key = (sub.taskId||'').startsWith('r1') ? 'r1' : ((sub.taskId||'').startsWith('r2') ? 'r2' : 'r3');
  teams[ti][key] = (+(teams[ti][key]||0)) + score;
  post({action:'setScore', slot:ti, key, value:teams[ti][key]});
  delete savedScores[idx];
  toast(`+${score} pts → ${teams[ti].name}`, 'ok');
  renderTeamsPanel(); renderSubmissions();
}

function approveSub(idx) {
  const sub = submissions[idx];
  const rawVal = document.getElementById('ssel-'+idx)?.value;
  if (rawVal === '' || rawVal == null) { toast('Set a score before approving','err'); return; }
  const score = parseInt(rawVal);
  const teamIdx = parseInt(document.getElementById('tsel-'+idx)?.value)||0;
  sub.finalScore = score; sub.approvedTeam = teamIdx; sub.status = 'approved';
  const key = sub.roundKey || 'r1';
  teams[teamIdx][key] = (+(teams[teamIdx][key]||0)) + score;
  post({action:'setScore', slot:teamIdx, key, value:teams[teamIdx][key]});
  delete savedScores[idx];
  toast(`+${score} pts → ${teams[teamIdx].name}`, 'ok');
  renderTeamsPanel(); renderSubmissions();
}

function rejectSub(idx) {
  const sub = submissions[idx];
  sub.status = 'rejected';
  post({action:'rejectSub', sheetId:sub.sheetId});
  renderSubmissions();
}

// ══════════════════════════════════════════════════════
// PHASE CONTROL
// ══════════════════════════════════════════════════════
async function startRound(idx) {
  currentRound = idx; currentPhase = 'round'+idx;
  const cfg = ROUNDS_CFG[idx];
  await post({action:'setPhase', phase:'round'+idx});

  document.getElementById('ctrl-badge').textContent = cfg.label;
  document.getElementById('ctrl-badge').className = 'ctrl-badge '+cfg.badge;
  document.getElementById('ctrl-title').textContent = cfg.title;
  document.getElementById('phase-status').textContent = cfg.label+' · '+cfg.title;
  [0,1,2].forEach(i => {
    document.getElementById('dot-'+i).className = 'pdot'+(i<idx?' done':i===idx?' active':'');
  });

  clearInterval(timerInt);
  timerSec = cfg.secs;
  renderCtrlTimer(cfg.secs);
  document.getElementById('ctrl-prog').style.width = '0%';
  timerInt = setInterval(() => {
    timerSec--;
    renderCtrlTimer(cfg.secs);
    document.getElementById('ctrl-prog').style.width = ((cfg.secs-timerSec)/cfg.secs*100)+'%';
    if (timerSec<=0) clearInterval(timerInt);
  }, 1000);

  const btns = document.getElementById('phase-btns');
  btns.innerHTML = '';
  if (idx < 2) {
    const nb = document.createElement('button');
    nb.className = 'phase-btn primary';
    nb.textContent = `▶ Start Round ${idx+2} (${idx===0?'12':'5'} min)`;
    nb.onclick = () => startRound(idx+1);
    btns.appendChild(nb);
  }
  const pitchBtn = document.createElement('button');
  pitchBtn.className = 'phase-btn gold';
  pitchBtn.textContent = '🎤 Go to Pitches';
  pitchBtn.onclick = startPitch;
  btns.appendChild(pitchBtn);

  document.getElementById('ctrl-desc').innerHTML = 'Round in progress. Submissions appear below as teams submit.';
}

function renderCtrlTimer(total) {
  const el = document.getElementById('ctrl-timer');
  if (!el) return;
  const m = Math.floor(Math.max(0,timerSec)/60);
  const s = Math.max(0,timerSec)%60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.className = 'ctrl-timer'+(timerSec<=30&&timerSec>0?' urgent':'');
}

async function startPitch() {
  clearInterval(timerInt); currentPhase='pitch';
  await post({action:'setPhase',phase:'pitch'});
  document.getElementById('ctrl-badge').textContent='PITCHES';
  document.getElementById('ctrl-badge').className='ctrl-badge bg-red';
  document.getElementById('ctrl-title').textContent='Pitch Time — 2 min per team';
  document.getElementById('phase-status').textContent='Pitch Time';
  timerSec=120;
  timerInt = setInterval(()=>{
    timerSec--;
    const m=Math.floor(Math.max(0,timerSec)/60), s=Math.max(0,timerSec)%60;
    const el=document.getElementById('ctrl-timer');
    if(el){el.textContent=`${m}:${s.toString().padStart(2,'0')}`;el.className='ctrl-timer'+(timerSec<=20&&timerSec>0?' urgent':'');}
    document.getElementById('ctrl-prog').style.width=((120-timerSec)/120*100)+'%';
    if(timerSec<=0)clearInterval(timerInt);
  },1000);
  const btns=document.getElementById('phase-btns');
  btns.innerHTML=`
    <button class="phase-btn" onclick="resetPitchTimer()">↺ Reset 2:00</button>
    <button class="phase-btn gold" onclick="startVote()">→ Start Vote</button>`;
  document.getElementById('ctrl-desc').innerHTML='Click ↺ Reset 2:00 between each team. Enter pitch scores (0–5) in the right panel.';
}

function resetPitchTimer() {
  clearInterval(timerInt); timerSec=120;
  timerInt = setInterval(()=>{
    timerSec--;
    const m=Math.floor(Math.max(0,timerSec)/60), s=Math.max(0,timerSec)%60;
    const el=document.getElementById('ctrl-timer');
    if(el){el.textContent=`${m}:${s.toString().padStart(2,'0')}`;el.className='ctrl-timer'+(timerSec<=20&&timerSec>0?' urgent':'');}
    document.getElementById('ctrl-prog').style.width=((120-timerSec)/120*100)+'%';
    if(timerSec<=0)clearInterval(timerInt);
  },1000);
}

async function startVote() {
  clearInterval(timerInt); currentPhase='vote';
  await post({action:'setPhase',phase:'vote'});
  document.getElementById('ctrl-badge').textContent='VOTE';
  document.getElementById('ctrl-title').textContent='Class Vote';
  document.getElementById('ctrl-timer').textContent='—';
  document.getElementById('phase-status').textContent='Class Vote';
  document.getElementById('vote-panel').style.display='block';
  document.getElementById('ctrl-desc').innerHTML='Students are voting on their phones. Watch the live tally. Click "Lock votes" when all votes are in.';
  document.getElementById('phase-btns').innerHTML='';
  renderVoteRows();
}

function lockVote() {
  const totalVotes = teams.reduce((s,t)=>s+t.voteCount,0);
  if (totalVotes>0) teams.forEach(t=>{t.vote=parseFloat((t.voteCount/totalVotes*5).toFixed(1));});
  post({action:'setScores', scores:teams.map(t=>({slot:t.slot,r1:t.r1,r2:t.r2,pitch:t.pitch,vote:t.vote}))});
  document.getElementById('final-card').style.display='block';
  renderFinalResults();
  document.getElementById('vote-panel').style.display='none';
  document.getElementById('ctrl-badge').textContent='RESULTS';
  document.getElementById('ctrl-title').textContent='Final Results';
  document.getElementById('ctrl-desc').innerHTML='Activity complete. Use the debrief questions to bridge into the platform slides.';
  document.getElementById('phase-btns').innerHTML='';
  document.getElementById('ctrl-timer').textContent='—';
  toast('Votes locked! Results calculated.','ok');
}

// ══════════════════════════════════════════════════════
// VOTE ROWS
// ══════════════════════════════════════════════════════
function renderVoteRows() {
  const totalVotes = teams.reduce((s,t)=>s+t.voteCount,0);
  const maxV = Math.max(1,...teams.map(t=>t.voteCount));
  const rows = document.getElementById('vote-rows');
  if (!rows) return;
  rows.innerHTML='';
  const sorted = [...teams].sort((a,b)=>b.voteCount-a.voteCount);
  sorted.forEach(t => {
    const pts = totalVotes>0?(t.voteCount/totalVotes*5).toFixed(1):0;
    const barW = Math.round(t.voteCount/maxV*100);
    const row = document.createElement('div');
    row.className = 'vote-row-item';
    row.innerHTML = `
      <div class="vote-row-top">
        <div class="team-dot" style="background:${TEAM_COLORS[t.slot]}"></div>
        <div style="flex:1;font-size:.88rem;font-weight:600;">${t.name}</div>
        <div class="vote-count">${t.voteCount}</div>
        <div class="vote-pts">${pts}pts</div>
      </div>
      <div class="vbar-wrap"><div class="vbar" style="width:${barW}%"></div></div>`;
    rows.appendChild(row);
  });
  if (totalVotes>0) {
    const note = document.createElement('div');
    note.style.cssText='padding:.45rem .85rem;font-size:.78rem;color:var(--muted);text-align:center;';
    note.textContent=`${totalVotes} vote${totalVotes!==1?'s':''} received`;
    rows.appendChild(note);
  }
}

// ══════════════════════════════════════════════════════
// FINAL RESULTS
// ══════════════════════════════════════════════════════
function renderFinalResults() {
  const sorted = [...teams].map(t=>({...t,total:(t.r1||0)+(t.r2||0)+(t.pitch||0)+(t.vote||0)}))
    .sort((a,b)=>b.total-a.total);
  const tbody = document.getElementById('final-tbody');
  if (!tbody) return;
  tbody.innerHTML='';
  sorted.forEach((t,i)=>{
    const tr = document.createElement('tr');
    if (i===0) tr.className='winner';
    tr.innerHTML=`<td>${i===0?'<span class="rank-star">★</span>':i+1}</td><td>${t.name}</td><td>${t.r1||0}</td><td>${t.r2||0}</td><td>${t.pitch||0}</td><td>${t.vote||0}</td><td><strong>${t.total}</strong></td>`;
    tbody.appendChild(tr);
  });
}

// ══════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════
async function resetGame() {
  if (!confirm('Clear all data and reset for a new class? This cannot be undone.')) return;
  await post({action:'reset'});
  teams = Array.from({length:6},(_,i)=>({slot:i,name:`Team ${i+1}`,r1:null,r2:null,pitch:null,vote:0,voteCount:0}));
  submissions = []; savedScores = {};
  currentPhase='setup'; currentRound=-1;
  clearInterval(timerInt);
  document.getElementById('ctrl-badge').textContent='SETUP';
  document.getElementById('ctrl-badge').className='ctrl-badge bg-red';
  document.getElementById('ctrl-title').textContent='The Bash Brief';
  document.getElementById('ctrl-timer').textContent='—';
  document.getElementById('ctrl-prog').style.width='0%';
  document.getElementById('phase-status').textContent='Setup';
  const tjEl=document.getElementById('teams-joined'); if(tjEl) tjEl.textContent='0';
  document.getElementById('vote-panel').style.display='none';
  document.getElementById('final-card').style.display='none';
  document.getElementById('phase-btns').innerHTML=`
    <button class="phase-btn primary" onclick="startRound(0)">▶ Start Round 1 (8 min)</button>
    <button class="phase-btn" style="margin-left:auto;border-color:#AA3333;color:var(--red);" onclick="resetGame()">↺ Reset for new class</button>`;
  [0,1,2].forEach(i=>document.getElementById('dot-'+i).className='pdot');
  renderTeamsPanel(); renderSubmissions();
  toast('Reset complete — ready for new class','ok');
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
let toastT=null;
function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  const base = window.location.origin+window.location.pathname.replace('instructor','student');
  const suEl = document.getElementById('student-url');
  if (suEl) suEl.textContent = base;
  renderTeamsPanel();
  poll();
  setInterval(poll, 3000);
});
</script>
